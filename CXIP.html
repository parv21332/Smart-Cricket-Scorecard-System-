<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Cricket Scoreboard Pro | Professional Scorecard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; padding: 12px; }
        .app-container { max-width: 1600px; margin: 0 auto; }
        
        .navbar {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 10px 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            position: sticky;
            top: 10px;
            z-index: 100;
        }
        .logo { display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: bold; background: linear-gradient(135deg, #e94560, #0f3460); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-links { display: flex; gap: 8px; flex-wrap: wrap; }
        .nav-btn { padding: 8px 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; background: #f0f0f0; color: #333; transition: all 0.2s; }
        .nav-btn:hover { transform: translateY(-2px); background: #e0e0e0; }
        .nav-btn.active { background: linear-gradient(135deg, #e94560, #0f3460); color: white; }
        
        .main-content { background: rgba(255,255,255,0.95); border-radius: 16px; padding: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.15); }
        
        .scoreboard {
            background: linear-gradient(135deg, #1e1b4b, #0f172a);
            color: white;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 15px;
        }
        .team-score { font-size: 42px; font-weight: 800; background: linear-gradient(135deg, #fff, #fbbf24); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .run-rate-box { display: flex; justify-content: center; gap: 20px; margin-top: 10px; flex-wrap: wrap; }
        .rate-card { background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 20px; font-size: 12px; }
        .rate-card span { font-weight: bold; color: #fbbf24; }
        .free-hit-badge { background: #ef4444; padding: 3px 10px; border-radius: 50px; font-size: 11px; margin-left: 8px; animation: pulse 1s infinite; display: inline-block; }
        .target-info { background: linear-gradient(135deg, #f59e0b, #d97706); display: inline-block; padding: 5px 12px; border-radius: 50px; margin-top: 10px; font-weight: bold; font-size: 12px; }
        .match-ended-banner { background: linear-gradient(135deg, #10b981, #059669); padding: 10px; border-radius: 12px; margin-top: 10px; font-weight: bold; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.8; } }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .card { background: white; border-radius: 14px; overflow: hidden; box-shadow: 0 3px 12px rgba(0,0,0,0.08); }
        .card-header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 10px 12px; font-weight: bold; font-size: 14px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .card-header.pink { background: linear-gradient(135deg, #ec489a, #db2777); }
        .card-header.green { background: linear-gradient(135deg, #10b981, #059669); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px 4px; text-align: center; border-bottom: 1px solid #e2e8f0; font-size: 11px; }
        th { background: #f8fafc; color: #1e293b; font-weight: 700; font-size: 10px; }
        .current-batsman { background: linear-gradient(135deg, #dbeafe, #bfdbfe) !important; font-weight: bold; }
        .current-bowler { background: linear-gradient(135deg, #fce7f3, #fbcfe8) !important; font-weight: bold; }
        
        .action-panel { background: white; border-radius: 14px; padding: 15px; margin-bottom: 15px; }
        .run-buttons { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 15px; }
        .run-btn { width: 55px; height: 55px; border-radius: 50%; border: none; font-size: 18px; font-weight: bold; cursor: pointer; background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; transition: all 0.2s; }
        .run-btn:active { transform: scale(0.95); }
        .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .special-btn { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .wicket-btn { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .control-group { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 12px; }
        select { padding: 8px 12px; border-radius: 10px; border: 2px solid #e2e8f0; font-size: 12px; background: white; }
        .current-over { background: #1e293b; padding: 10px; border-radius: 12px; margin-bottom: 12px; display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; }
        .ball { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 11px; }
        .ball-normal { background: #475569; color: white; }
        .ball-four { background: #10b981; color: white; }
        .ball-six { background: #8b5cf6; color: white; }
        .ball-wide { background: #f59e0b; color: #1e293b; }
        .ball-noball { background: #ec489a; color: white; }
        .ball-wicket { background: #ef4444; color: white; }
        .ball-empty { background: #334155; color: #64748b; border: 2px dashed #64748b; }
        .warning { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; padding: 8px; border-radius: 10px; text-align: center; margin-bottom: 12px; font-weight: bold; font-size: 12px; }
        .point-table-container { background: white; border-radius: 14px; overflow: hidden; margin-top: 15px; }
        .history-box { background: #1e293b; color: #94a3b8; padding: 10px; border-radius: 10px; font-family: monospace; font-size: 10px; max-height: 70px; overflow-y: auto; margin-top: 12px; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); z-index: 1000; justify-content: center; align-items: center; padding: 12px; }
        .modal-content { background: white; border-radius: 16px; padding: 15px; max-width: 95%; width: 100%; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #e2e8f0; flex-wrap: wrap; gap: 8px; }
        .scorecard-section { margin-bottom: 15px; }
        .scorecard-section h3 { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 8px; border-radius: 10px; margin-bottom: 8px; font-size: 14px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 12px; }
        .form-group input, .form-group select { width: 100%; padding: 8px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 12px; }
        .player-input-group { margin-bottom: 6px; padding: 6px; background: #f8fafc; border-radius: 8px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .player-input-group input { flex: 1; min-width: 120px; margin: 0; }
        .remove-player { background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .btn { padding: 8px 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 12px; display: inline-flex; align-items: center; gap: 5px; }
        .btn-primary { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
        .btn-success { background: linear-gradient(135deg, #10b981, #059669); color: white; }
        .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
        .btn-info { background: linear-gradient(135deg, #06b6d4, #0891b2); color: white; }
        .btn-secondary { background: linear-gradient(135deg, #6c5ce7, #5b4bc4); color: white; }
        .export-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
        
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; gap: 12px; }
            .run-btn { width: 48px; height: 48px; font-size: 16px; }
            .ball { width: 35px; height: 35px; font-size: 10px; }
            .team-score { font-size: 32px; }
            .nav-btn { padding: 6px 10px; font-size: 10px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="navbar">
        <div class="logo"><i class="fas fa-cricket"></i><span>CRICKET PRO</span></div>
        <div class="nav-links">
            <button class="nav-btn active" id="navLiveBtn" onclick="showLiveMatch()"><i class="fas fa-home"></i> Live</button>
            <button class="nav-btn" id="navScorecardBtn" onclick="showFullScorecard()"><i class="fas fa-chart-simple"></i> Full Scorecard</button>
            <button class="nav-btn" id="navPointsBtn" onclick="showPointTable()"><i class="fas fa-trophy"></i> Points</button>
            <button class="nav-btn" onclick="showMatchSetup()"><i class="fas fa-plus"></i> New</button>
        </div>
    </div>

    <div class="main-content" id="mainContent">
        <div id="liveMatchView">
            <div class="scoreboard">
                <div class="team-score" id="teamScore">-- / --</div>
                <div class="run-rate-box">
                    <div class="rate-card"><i class="fas fa-chart-line"></i> CRR: <span id="currentRunRate">0.00</span></div>
                    <div class="rate-card" id="requiredRateBox" style="display:none;"><i class="fas fa-bullseye"></i> RRR: <span id="requiredRunRate">0.00</span></div>
                </div>
                <div class="match-details" id="matchDetails">No match in progress</div>
                <div id="targetDisplay"></div>
                <div id="matchResultBanner" style="display:none;" class="match-ended-banner"></div>
            </div>

            <div class="stats-grid">
                <div class="card">
                    <div class="card-header"><span><i class="fas fa-batting-ball"></i> BATTING</span><span id="battingTeamName"></span></div>
                    <div style="overflow-x:auto;"><table id="battingTable"><thead><tr><th>Batsman</th><th>R</th><th>B</th><th>4s</th><th>6s</th><th>SR</th></tr></thead><tbody id="battingBody"></tbody></table></div>
                </div>
                <div class="card">
                    <div class="card-header pink"><span><i class="fas fa-bowling-ball"></i> BOWLING</span><span id="bowlingTeamName"></span></div>
                    <div style="overflow-x:auto;"><table id="bowlingTable"><thead><tr><th>Bowler</th><th>O</th><th>R</th><th>W</th><th>Econ</th></tr></thead><tbody id="bowlingBody"></tbody></table></div>
                </div>
            </div>

            <div class="action-panel" id="actionPanel">
                <div id="warningBox" class="warning" style="display:none;"><i class="fas fa-exclamation-triangle"></i> OVER COMPLETED! Change bowler!</div>
                <div class="current-over" id="currentOverBox"></div>
                <div class="run-buttons">
                    <button class="run-btn" onclick="addRuns(0)">0</button>
                    <button class="run-btn" onclick="addRuns(1)">1</button>
                    <button class="run-btn" onclick="addRuns(2)">2</button>
                    <button class="run-btn" onclick="addRuns(3)">3</button>
                    <button class="run-btn" onclick="addRuns(4)">4</button>
                    <button class="run-btn" onclick="addRuns(5)">5</button>
                    <button class="run-btn" onclick="addRuns(6)">6</button>
                    <button class="run-btn special-btn" onclick="addWide()"><i class="fas fa-arrow-right"></i> Wd</button>
                    <button class="run-btn special-btn" onclick="showNoBallModal()"><i class="fas fa-ban"></i> NB</button>
                    <button class="run-btn wicket-btn" onclick="addWicket()"><i class="fas fa-user-slash"></i> W</button>
                </div>
                <div class="control-group">
                    <select id="bowlerSelect"><option value="">Select Bowler</option></select>
                    <button class="btn btn-info" onclick="changeBowler()"><i class="fas fa-sync-alt"></i> Change Bowler</button>
                    <span id="bowlerStatus"></span>
                </div>
                <div class="history-box" id="historyBox"><i class="fas fa-history"></i> Start a match!</div>
            </div>
        </div>

        <div id="pointTableView" style="display:none;">
            <div class="point-table-container">
                <div class="card-header green"><span><i class="fas fa-trophy"></i> POINT TABLE (with NRR)</span>
                    <div class="export-buttons"><button class="btn btn-success" onclick="exportPointTablePDF()"><i class="fas fa-file-pdf"></i> PDF</button><button class="btn btn-info" onclick="exportPointTableHTML()"><i class="fas fa-download"></i> HTML</button></div>
                </div>
                <div style="overflow-x:auto;"><table id="pointTable"><thead><tr><th>Team</th><th>M</th><th>W</th><th>L</th><th>NR</th><th>Pts</th><th>NRR</th></tr></thead><tbody id="pointTableBody"></tbody></table></div>
            </div>
        </div>
    </div>
</div>

<div id="noballModal" class="modal"><div class="modal-content"><h2 style="color:#ec489a;text-align:center;"><i class="fas fa-exclamation-circle"></i> NO BALL!</h2><p style="text-align:center;margin:10px 0;">Select runs scored</p><div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;"><button class="btn btn-primary" onclick="processNoBall(0)">0</button><button class="btn btn-primary" onclick="processNoBall(1)">1</button><button class="btn btn-primary" onclick="processNoBall(2)">2</button><button class="btn btn-primary" onclick="processNoBall(3)">3</button><button class="btn btn-primary" onclick="processNoBall(4)">4</button><button class="btn btn-primary" onclick="processNoBall(6)">6</button></div><p style="margin-top:10px;font-size:11px;color:#666;text-align:center;"><i class="fas fa-info-circle"></i> Next ball = FREE HIT!</p><button class="btn btn-danger" style="margin-top:12px;width:100%;" onclick="closeNoBallModal()">Cancel</button></div></div>

<div id="fullScorecardModal" class="modal"><div class="modal-content" id="fullScorecardContent"></div></div>

<div id="setupModal" class="modal"><div class="modal-content"><div class="modal-header"><h2><i class="fas fa-cricket"></i> Match Setup</h2><button class="btn btn-danger" onclick="closeModal()"><i class="fas fa-times"></i></button></div>
<div style="background:#f0f0f0;padding:12px;border-radius:12px;margin-bottom:15px;"><h3 style="color:#e94560;margin-bottom:8px;"><i class="fas fa-users"></i> Team A</h3><div class="form-group"><label>Team Name</label><input type="text" id="teamAName" value="India"></div><label>Players</label><div id="teamAPlayersList"></div><button class="btn btn-secondary" style="margin-top:8px;width:100%;" onclick="addPlayerToTeam('A')"><i class="fas fa-plus"></i> Add Player</button></div>
<div style="background:#f0f0f0;padding:12px;border-radius:12px;margin-bottom:15px;"><h3 style="color:#0f3460;margin-bottom:8px;"><i class="fas fa-users"></i> Team B</h3><div class="form-group"><label>Team Name</label><input type="text" id="teamBName" value="Australia"></div><label>Players</label><div id="teamBPlayersList"></div><button class="btn btn-secondary" style="margin-top:8px;width:100%;" onclick="addPlayerToTeam('B')"><i class="fas fa-plus"></i> Add Player</button></div>
<div class="form-group"><label><i class="fas fa-clock"></i> Overs</label><select id="oversSelect"><option value="10">10 Overs</option><option value="20" selected>20 Overs</option><option value="50">50 Overs</option></select></div>
<div class="form-group"><label><i class="fas fa-flag-checkered"></i> Batting First</label><select id="batFirst"><option value="A">Team A</option><option value="B">Team B</option></select></div>
<button class="btn btn-success" style="width:100%;" onclick="startMatch()"><i class="fas fa-play"></i> Start Match</button></div></div>

<script>
    // ==================== DATA STRUCTURES ====================
    let pointTable = {};
    let currentMatch = null;
    let matchActive = false;
    let matchEnded = false;
    let teamAPlayers = ['Rohit Sharma', 'Virat Kohli', 'Shreyas Iyer', 'KL Rahul', 'Hardik Pandya', 'Ravindra Jadeja', 'Jasprit Bumrah', 'Mohammed Shami', 'Mohammed Siraj', 'Kuldeep Yadav', 'Washington Sundar'];
    let teamBPlayers = ['David Warner', 'Travis Head', 'Mitchell Marsh', 'Glenn Maxwell', 'Marcus Stoinis', 'Alex Carey', 'Pat Cummins', 'Mitchell Starc', 'Josh Hazlewood', 'Adam Zampa', 'Nathan Ellis'];

    class Player {
        constructor(name) { 
            this.name = name; this.runs = 0; this.balls = 0; this.fours = 0; this.sixes = 0; this.isOut = false; 
        }
        getSR() { return this.balls === 0 ? 0 : (this.runs / this.balls * 100).toFixed(1); }
        clone() { let p = new Player(this.name); p.runs = this.runs; p.balls = this.balls; p.fours = this.fours; p.sixes = this.sixes; p.isOut = this.isOut; return p; }
    }
    
    class Bowler {
        constructor(name) { this.name = name; this.legalBalls = 0; this.runs = 0; this.wickets = 0; }
        getOvers() { let overs = Math.floor(this.legalBalls / 6); let balls = this.legalBalls % 6; return `${overs}.${balls}`; }
        getEcon() { let oversBowled = this.legalBalls / 6; return oversBowled === 0 ? 0 : (this.runs / oversBowled).toFixed(2); }
        clone() { let b = new Bowler(this.name); b.legalBalls = this.legalBalls; b.runs = this.runs; b.wickets = this.wickets; return b; }
    }

    class Match {
        constructor(teamAName, teamBName, teamAPlayersList, teamBPlayersList, totalOvers, batFirst) {
            this.teamAName = teamAName; this.teamBName = teamBName; this.totalOvers = totalOvers; this.batFirst = batFirst;
            this.teamAPlayers = teamAPlayersList.map(n => new Player(n)); 
            this.teamBPlayers = teamBPlayersList.map(n => new Player(n));
            this.battingTeam = batFirst === 'A' ? this.teamAPlayers : this.teamBPlayers;
            this.bowlingTeam = batFirst === 'A' ? this.teamBPlayers : this.teamAPlayers;
            this.battingTeamName = batFirst === 'A' ? teamAName : teamBName;
            this.bowlingTeamName = batFirst === 'A' ? teamBName : teamAName;
            this.runs = 0; this.wickets = 0; this.extras = 0; this.wides = 0; this.noBalls = 0;
            this.legalBalls = 0; this.currentOverBalls = 0; this.isFreeHit = false;
            this.striker = 0; this.nonStriker = 1; this.currentBowler = null; this.bowlers = []; this.lastBowler = null;
            this.overComplete = false; this.currentOverList = []; this.overHistory = [];
            this.isFirstInnings = true; this.target = null; this.matchEnded = false;
            this.battingTeam[0].isOut = false; this.battingTeam[1].isOut = false;
            this.firstInningsSnapshot = null;
            this.secondInningsSnapshot = null;
            this.matchWinner = null;
            this.winMargin = null;
        }
        
        getStriker() { return this.battingTeam[this.striker]; }
        getNonStriker() { return this.battingTeam[this.nonStriker]; }
        formatOvers() { let overs = Math.floor(this.legalBalls / 6); let balls = this.legalBalls % 6; return `${overs}.${balls}`; }
        getCRR() { let oversBowled = this.legalBalls / 6; return oversBowled === 0 ? 0 : (this.runs / oversBowled).toFixed(2); }
        getRRR() { 
            if (this.isFirstInnings || !this.target || this.matchEnded) return 0; 
            let ballsLeft = (this.totalOvers * 6) - this.legalBalls;
            let runsNeeded = this.target - this.runs;
            if (ballsLeft <= 0 || runsNeeded <= 0) return 0; 
            return (runsNeeded / (ballsLeft / 6)).toFixed(2); 
        }
        getRunsNeeded() { return this.target ? Math.max(0, this.target - this.runs) : 0; }
        getBallsLeft() { return (this.totalOvers * 6) - this.legalBalls; }
        getNextBatsman() { for (let i = 0; i < this.battingTeam.length; i++) if (!this.battingTeam[i].isOut && i !== this.striker && i !== this.nonStriker) return i; return -1; }
        rotateStrikeIfNeeded(runs) { if (runs % 2 === 1) { [this.striker, this.nonStriker] = [this.nonStriker, this.striker]; } }
        
        addRuns(runs) {
            if (this.overComplete) { alert("Over completed! Change bowler first!"); return false; }
            if (this.matchEnded) { alert("Match has ended!"); return false; }
            let striker = this.getStriker(); if (!striker || striker.isOut) return false;
            striker.runs += runs; striker.balls++; if (runs === 4) striker.fours++; if (runs === 6) striker.sixes++;
            this.runs += runs; if (this.currentBowler) { this.currentBowler.runs += runs; this.currentBowler.legalBalls++; }
            this.currentOverList.push({ type: 'run', value: runs }); this.currentOverBalls++; this.legalBalls++;
            this.rotateStrikeIfNeeded(runs);
            this.isFreeHit = false;
            if (this.currentOverBalls === 6) this.completeOver(); 
            return true;
        }
        
        addWide() {
            if (this.overComplete) { alert("Over completed! Change bowler first!"); return false; }
            if (this.matchEnded) { alert("Match has ended!"); return false; }
            this.extras++; this.wides++; this.runs++;
            if (this.currentBowler) this.currentBowler.runs++;
            this.currentOverList.push({ type: 'wide', value: 1 }); 
            return true;
        }
        
        addNoBall(runsScored) {
            if (this.overComplete) { alert("Over completed! Change bowler first!"); return false; }
            if (this.matchEnded) { alert("Match has ended!"); return false; }
            let totalRuns = 1 + runsScored; this.extras++; this.noBalls++; this.runs += totalRuns;
            let striker = this.getStriker(); 
            if (striker && runsScored > 0) { striker.runs += runsScored; striker.balls++; if (runsScored === 4) striker.fours++; if (runsScored === 6) striker.sixes++; }
            if (this.currentBowler) this.currentBowler.runs += totalRuns;
            this.currentOverList.push({ type: 'noball', value: runsScored }); 
            if (runsScored % 2 === 1) this.rotateStrikeIfNeeded(runsScored);
            this.isFreeHit = true; 
            return true;
        }
        
        addWicket() {
            if (this.overComplete) { alert("Over completed! Change bowler first!"); return false; }
            if (this.matchEnded) { alert("Match has ended!"); return false; }
            if (this.isFreeHit) { alert("FREE HIT! Cannot take wicket!"); return false; }
            let striker = this.getStriker(); if (!striker || striker.isOut) return false;
            striker.isOut = true; this.wickets++;
            if (this.currentBowler) { this.currentBowler.wickets++; this.currentBowler.legalBalls++; }
            this.currentOverList.push({ type: 'wicket', value: 'W' }); this.currentOverBalls++; this.legalBalls++;
            let nextIdx = this.getNextBatsman(); if (nextIdx !== -1) this.striker = nextIdx;
            if (this.currentOverBalls === 6) this.completeOver(); 
            return true;
        }
        
        completeOver() {
            this.overHistory.push([...this.currentOverList]);
            if (this.currentBowler) { this.bowlers.push(this.currentBowler); this.lastBowler = this.currentBowler.name; }
            this.currentOverBalls = 0; this.currentOverList = []; this.overComplete = true; this.isFreeHit = false;
            [this.striker, this.nonStriker] = [this.nonStriker, this.striker];
        }
        
        setBowler(bowlerName) {
            if (!this.overComplete && this.legalBalls > 0) { alert("Complete current over first!"); return false; }
            if (this.lastBowler === bowlerName && this.legalBalls > 0) { alert("Same bowler cannot bowl consecutive overs!"); return false; }
            let bowler = this.bowlers.find(b => b.name === bowlerName); if (!bowler) bowler = new Bowler(bowlerName);
            this.currentBowler = bowler; this.overComplete = false; this.currentOverList = []; this.currentOverBalls = 0; 
            return true;
        }
        
        isInningComplete() { return this.wickets >= 10 || this.legalBalls >= this.totalOvers * 6; }
        
        isMatchComplete() {
            if (this.isFirstInnings) return false;
            return (this.runs >= this.target) || (this.wickets >= 10) || (this.legalBalls >= this.totalOvers * 6);
        }
        
        getMatchResult() {
            if (!this.target) return null;
            if (this.runs >= this.target) {
                return `${this.battingTeamName} won by ${10 - this.wickets} wickets`;
            } else if (this.wickets >= 10 || this.legalBalls >= this.totalOvers * 6) {
                let margin = this.target - this.runs - 1;
                return `${this.bowlingTeamName} won by ${margin} runs`;
            }
            return null;
        }
        
        takeFirstInningsSnapshot() {
            this.firstInningsSnapshot = {
                battingTeam: this.battingTeam.map(p => p.clone()),
                bowlingTeam: this.bowlingTeam.map(p => p.clone()),
                battingTeamName: this.battingTeamName,
                bowlingTeamName: this.bowlingTeamName,
                runs: this.runs, wickets: this.wickets, overs: this.formatOvers(),
                bowlers: this.bowlers.map(b => b.clone()), extras: this.extras, wides: this.wides, noBalls: this.noBalls
            };
        }
        
        takeSecondInningsSnapshot() {
            this.secondInningsSnapshot = {
                battingTeam: this.battingTeam.map(p => p.clone()),
                bowlingTeam: this.bowlingTeam.map(p => p.clone()),
                battingTeamName: this.battingTeamName,
                bowlingTeamName: this.bowlingTeamName,
                runs: this.runs, wickets: this.wickets, overs: this.formatOvers(),
                bowlers: this.bowlers.map(b => b.clone()), extras: this.extras, wides: this.wides, noBalls: this.noBalls, target: this.target
            };
        }
    }

    // Navigation
    function showLiveMatch() { 
        document.getElementById('liveMatchView').style.display = 'block'; 
        document.getElementById('pointTableView').style.display = 'none'; 
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active')); 
        document.getElementById('navLiveBtn').classList.add('active');
        if (currentMatch) updateUI(); 
    }
    
    function showPointTable() { 
        document.getElementById('liveMatchView').style.display = 'none'; 
        document.getElementById('pointTableView').style.display = 'block'; 
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active')); 
        document.getElementById('navPointsBtn').classList.add('active');
        updatePointTableUI(); 
    }

    function showFullScorecard() {
        if (!currentMatch) { alert("No match in progress! Start a match first."); return; }
        let content = generateScorecardHTML();
        document.getElementById('fullScorecardContent').innerHTML = content;
        document.getElementById('fullScorecardModal').style.display = 'flex';
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active')); 
        document.getElementById('navScorecardBtn').classList.add('active');
    }
    
    function generateScorecardHTML() {
        let match = currentMatch;
        let html = `<div class="modal-header"><h2><i class="fas fa-chart-simple"></i> FULL SCORECARD</h2><div class="export-buttons"><button class="btn btn-success" onclick="exportFullScorecardPDF()"><i class="fas fa-file-pdf"></i> PDF</button><button class="btn btn-info" onclick="exportFullScorecardHTML()"><i class="fas fa-download"></i> HTML</button><button class="btn btn-danger" onclick="closeFullScorecard()"><i class="fas fa-times"></i></button></div></div>`;
        
        if (match.firstInningsSnapshot) {
            let fs = match.firstInningsSnapshot;
            html += `<div class="scorecard-section"><h3>🏏 ${fs.battingTeamName} - 1st INNINGS</h3><p><strong>Score:</strong> ${fs.runs}/${fs.wickets} (${fs.overs} overs) | RR: ${(fs.runs/parseFloat(fs.overs||1)).toFixed(2)}</p><table style="width:100%"><thead><tr><th>Batsman</th><th>R</th><th>B</th><th>4s</th><th>6s</th><th>SR</th></tr></thead><tbody>${fs.battingTeam.map(p => `<tr><td>${p.name}${p.isOut ? ' †' : ' *'}</td><td><b>${p.runs}</b></td><td>${p.balls}</td><td>${p.fours}</td><td>${p.sixes}</td><td>${p.getSR()}</td></tr>`).join('')}</tbody></table><p><strong>Bowling:</strong></p><table style="width:100%"><thead><tr><th>Bowler</th><th>O</th><th>R</th><th>W</th><th>Econ</th></tr></thead><tbody>${fs.bowlers.map(b => `<tr><td>${b.name}</td><td>${b.getOvers()}</td><td>${b.runs}</td><td>${b.wickets}</td><td>${b.getEcon()}</td></tr>`).join('')}</tbody></table></div>`;
        }
        
        if (match.secondInningsSnapshot || (!match.isFirstInnings && !match.matchEnded)) {
            let ss = match.secondInningsSnapshot || { battingTeam: match.battingTeam, battingTeamName: match.battingTeamName, runs: match.runs, wickets: match.wickets, overs: match.formatOvers(), bowlers: match.bowlers };
            html += `<div class="scorecard-section"><h3>🏏 ${ss.battingTeamName} - 2nd INNINGS</h3><p><strong>Score:</strong> ${ss.runs}/${ss.wickets} (${ss.overs} overs) | RR: ${(ss.runs/parseFloat(ss.overs||1)).toFixed(2)}${match.target ? ` | Target: ${match.target}` : ''}</p><table style="width:100%"><thead><tr><th>Batsman</th><th>R</th><th>B</th><th>4s</th><th>6s</th><th>SR</th></tr></thead><tbody>${ss.battingTeam.map(p => `<tr><td>${p.name}${p.isOut ? ' †' : ' *'}</td><td><b>${p.runs}</b></td><td>${p.balls}</td><td>${p.fours}</td><td>${p.sixes}</td><td>${p.getSR()}</td></tr>`).join('')}</tbody></table><p><strong>Bowling:</strong></p><table style="width:100%"><thead><tr><th>Bowler</th><th>O</th><th>R</th><th>W</th><th>Econ</th></tr></thead><tbody>${ss.bowlers.map(b => `<tr><td>${b.name}</td><td>${b.getOvers()}</td><td>${b.runs}</td><td>${b.wickets}</td><td>${b.getEcon()}</td></tr>`).join('')}</tbody></table></div>`;
        }
        
        if (match.matchEnded && match.target) {
            let result = match.getMatchResult();
            if (result) html += `<div style="text-align:center;margin-top:15px;padding:10px;background:#10b981;color:white;border-radius:10px;"><strong>🏆 ${result} 🏆</strong></div>`;
        }
        html += `<div style="text-align:center;margin-top:15px;font-size:10px;color:#666;">Generated on ${new Date().toLocaleString()}</div>`;
        return html;
    }
    
    function closeFullScorecard() { document.getElementById('fullScorecardModal').style.display = 'none'; }
    function exportFullScorecardPDF() { let element = document.getElementById('fullScorecardContent').cloneNode(true); html2pdf().from(element).set({ margin: 0.5, filename: 'full_scorecard.pdf' }).save(); }
    function exportFullScorecardHTML() { let content = document.getElementById('fullScorecardContent').innerHTML; let blob = new Blob([`<html><head><title>Full Scorecard</title><style>body{font-family:Arial;padding:20px}table{border-collapse:collapse;width:100%}th,td{border:1px solid #ddd;padding:8px;text-align:center}th{background:#667eea;color:white}</style></head><body>${content}</body></html>`], {type:'text/html'}); let link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = 'full_scorecard.html'; link.click(); }
    function exportPointTablePDF() { let element = document.getElementById('pointTable'); html2pdf().from(element).set({ margin: 0.5, filename: 'point_table.pdf' }).save(); }
    function exportPointTableHTML() { let tableHtml = document.getElementById('pointTable').outerHTML; let blob = new Blob([`<html><head><title>Point Table</title><style>body{font-family:Arial;padding:20px}table{border-collapse:collapse;width:100%}th,td{border:1px solid #ddd;padding:10px;text-align:center}th{background:#10b981;color:white}</style></head><body><h1>Point Table</h1>${tableHtml}<p>Generated on ${new Date().toLocaleString()}</p></body></html>`], {type:'text/html'}); let link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = 'point_table.html'; link.click(); }

    // Player Management
    function renderPlayerLists() {
        let teamADiv = document.getElementById('teamAPlayersList'); teamADiv.innerHTML = '';
        teamAPlayers.forEach((player, index) => { teamADiv.innerHTML += `<div class="player-input-group"><input type="text" value="${player.replace(/"/g, '&quot;')}" onchange="updatePlayerName('A',${index},this.value)"><button class="remove-player" onclick="removePlayer('A',${index})"><i class="fas fa-trash"></i></button></div>`; });
        let teamBDiv = document.getElementById('teamBPlayersList'); teamBDiv.innerHTML = '';
        teamBPlayers.forEach((player, index) => { teamBDiv.innerHTML += `<div class="player-input-group"><input type="text" value="${player.replace(/"/g, '&quot;')}" onchange="updatePlayerName('B',${index},this.value)"><button class="remove-player" onclick="removePlayer('B',${index})"><i class="fas fa-trash"></i></button></div>`; });
    }
    function addPlayerToTeam(team) { if (team === 'A') teamAPlayers.push(`Player ${teamAPlayers.length+1}`); else teamBPlayers.push(`Player ${teamBPlayers.length+1}`); renderPlayerLists(); }
    function removePlayer(team, index) { if (team === 'A') { if (teamAPlayers.length<=2) { alert("Need at least 2 players!"); return; } teamAPlayers.splice(index,1); } else { if (teamBPlayers.length<=2) { alert("Need at least 2 players!"); return; } teamBPlayers.splice(index,1); } renderPlayerLists(); }
    function updatePlayerName(team, index, newName) { if (team === 'A') teamAPlayers[index] = newName; else teamBPlayers[index] = newName; }

    function showMatchSetup() { renderPlayerLists(); document.getElementById('setupModal').style.display = 'flex'; }
    
    function startMatch() {
        let teamAName = document.getElementById('teamAName').value, teamBName = document.getElementById('teamBName').value;
        if (!teamAName || !teamBName) { alert("Enter team names!"); return; }
        if (teamAPlayers.length < 2 || teamBPlayers.length < 2) { alert("Each team needs at least 2 players!"); return; }
        let overs = parseInt(document.getElementById('oversSelect').value), batFirst = document.getElementById('batFirst').value;
        currentMatch = new Match(teamAName, teamBName, teamAPlayers, teamBPlayers, overs, batFirst);
        matchActive = true; matchEnded = false; closeModal(); updateUI(); enableButtons(true); showLiveMatch();
    }

    function updateUI() { 
        if (!currentMatch) return;
        let match = currentMatch;
        
        if (match.matchEnded) {
            document.getElementById('teamScore').innerHTML = `${match.battingTeamName}: ${match.runs}/${match.wickets} (${match.formatOvers()})`;
            document.getElementById('requiredRateBox').style.display = 'none';
            let result = match.getMatchResult();
            if (result) document.getElementById('matchResultBanner').innerHTML = `<strong>🏆 ${result} 🏆</strong>`;
            document.getElementById('matchResultBanner').style.display = 'block';
            document.getElementById('actionPanel').style.opacity = '0.5';
            return;
        } else {
            document.getElementById('matchResultBanner').style.display = 'none';
            document.getElementById('actionPanel').style.opacity = '1';
        }
        
        let freeHitHtml = match.isFreeHit ? '<span class="free-hit-badge"><i class="fas fa-fire"></i> FREE HIT</span>' : '';
        document.getElementById('teamScore').innerHTML = `${match.battingTeamName}: ${match.runs}/${match.wickets} (${match.formatOvers()}) ${freeHitHtml}`;
        document.getElementById('currentRunRate').innerHTML = match.getCRR();
        
        if (!match.isFirstInnings && match.target && !match.matchEnded) {
            document.getElementById('requiredRateBox').style.display = 'flex';
            document.getElementById('requiredRunRate').innerHTML = match.getRRR();
            let runsNeeded = match.getRunsNeeded();
            let ballsLeft = match.getBallsLeft();
            if (runsNeeded > 0) {
                document.getElementById('targetDisplay').innerHTML = `<div class="target-info"><i class="fas fa-bullseye"></i> Target: ${match.target} | Need ${runsNeeded} runs in ${ballsLeft} balls</div>`;
            } else {
                document.getElementById('targetDisplay').innerHTML = `<div class="target-info"><i class="fas fa-trophy"></i> Target ACHIEVED! Match Over!</div>`;
            }
        } else { 
            document.getElementById('requiredRateBox').style.display = 'none'; 
            document.getElementById('targetDisplay').innerHTML = '';
        }
        
        document.getElementById('matchDetails').innerHTML = `<i class="fas fa-chart-line"></i> Overs: ${match.formatOvers()} | Extras: ${match.extras} (W:${match.wides} NB:${match.noBalls})`;
        document.getElementById('battingTeamName').innerHTML = `<i class="fas fa-bat"></i> ${match.battingTeamName}`;
        document.getElementById('bowlingTeamName').innerHTML = `<i class="fas fa-bowling-ball"></i> ${match.bowlingTeamName}`;
        document.getElementById('warningBox').style.display = match.overComplete ? 'block' : 'none';
        
        let overBox = document.getElementById('currentOverBox'); overBox.innerHTML = '';
        for (let ball of match.currentOverList) {
            let div = document.createElement('div'); div.className = 'ball ball-normal';
            if (ball.type === 'run') { div.textContent = ball.value; if(ball.value===4) div.className='ball ball-four'; if(ball.value===6) div.className='ball ball-six'; }
            else if (ball.type === 'wide') { div.className='ball ball-wide'; div.innerHTML='<i class="fas fa-arrow-right"></i>'; }
            else if (ball.type === 'noball') { div.className='ball ball-noball'; div.textContent=`NB+${ball.value}`; }
            else if (ball.type === 'wicket') { div.className='ball ball-wicket'; div.innerHTML='<i class="fas fa-user-slash"></i>'; }
            overBox.appendChild(div);
        }
        for (let i = match.currentOverList.length; i < 6; i++) { let div = document.createElement('div'); div.className = 'ball ball-empty'; div.textContent = '○'; overBox.appendChild(div); }
        
        let battingHtml = '';
        for (let i = 0; i < match.battingTeam.length; i++) {
            let p = match.battingTeam[i];
            if (!p.isOut || p.runs > 0) {
                let name = p.name, cls = '';
                if (i === match.striker && !p.isOut) { name += ' *'; cls = 'current-batsman'; }
                else if (i === match.nonStriker && !p.isOut) name += ' ⁺';
                battingHtml += `<tr class="${cls}"><td>${name}</td><td><strong>${p.runs}</strong></td><td>${p.balls}</td><td>${p.fours}</td><td>${p.sixes}</td><td>${p.getSR()}</td></tr>`;
            }
        }
        document.getElementById('battingBody').innerHTML = battingHtml;
        
        let bowlingHtml = '';
        let allBowlers = [...match.bowlers];
        if (match.currentBowler && !allBowlers.find(b => b.name === match.currentBowler.name)) allBowlers.push(match.currentBowler);
        for (let b of allBowlers) {
            let cls = (match.currentBowler && match.currentBowler.name === b.name) ? 'current-bowler' : '';
            bowlingHtml += `<tr class="${cls}"><td>${b.name}</td><td>${b.getOvers()}</td><td>${b.runs}</td><td>${b.wickets}</td><td>${b.getEcon()}</td></tr>`;
        }
        document.getElementById('bowlingBody').innerHTML = bowlingHtml;
        
        let select = document.getElementById('bowlerSelect'); select.innerHTML = '<option value="">Select Bowler</option>';
        let availableBowlers = match.bowlingTeam.filter(p => p.name !== match.lastBowler);
        availableBowlers.forEach(p => { select.innerHTML += `<option value="${p.name}">${p.name}</option>`; });
        document.getElementById('bowlerStatus').innerHTML = match.overComplete ? '⚠️ MUST CHANGE!' : `${6 - match.currentOverBalls} balls left`;
        
        let historyDiv = document.getElementById('historyBox');
        if (match.overHistory.length === 0) historyDiv.innerHTML = '<i class="fas fa-history"></i> No overs yet.';
        else historyDiv.innerHTML = match.overHistory.slice(-5).map((over, idx) => `Over ${idx+1}: ${over.map(b => { if(b.type==='run') return b.value; if(b.type==='wide') return 'Wd'; if(b.type==='noball') return `NB+${b.value}`; return 'W'; }).join(' ')}`).join(' | ');
        
        if (match.isMatchComplete() && !match.matchEnded) handleMatchEnd();
        else if (match.isInningComplete() && match.isFirstInnings && !match.matchEnded) handleInningEnd();
    }

    function handleInningEnd() {
        if (currentMatch.isFirstInnings && !currentMatch.matchEnded) {
            currentMatch.takeFirstInningsSnapshot();
            currentMatch.target = currentMatch.runs + 1;
            currentMatch.isFirstInnings = false;
            let temp = currentMatch.battingTeam; currentMatch.battingTeam = currentMatch.bowlingTeam; currentMatch.bowlingTeam = temp;
            let tempName = currentMatch.battingTeamName; currentMatch.battingTeamName = currentMatch.bowlingTeamName; currentMatch.bowlingTeamName = tempName;
            currentMatch.runs = 0; currentMatch.wickets = 0; currentMatch.extras = 0; currentMatch.wides = 0; currentMatch.noBalls = 0;
            currentMatch.legalBalls = 0; currentMatch.currentOverBalls = 0; currentMatch.isFreeHit = false;
            currentMatch.striker = 0; currentMatch.nonStriker = 1; currentMatch.currentBowler = null; currentMatch.bowlers = []; currentMatch.lastBowler = null;
            currentMatch.overComplete = false; currentMatch.currentOverList = []; currentMatch.matchEnded = false;
            currentMatch.battingTeam.forEach(p => { p.isOut = false; p.runs = 0; p.balls = 0; p.fours = 0; p.sixes = 0; });
            alert(`🏏 First Innings Complete!\n${currentMatch.bowlingTeamName}: ${currentMatch.target - 1}/${currentMatch.firstInningsSnapshot.wickets} (${currentMatch.firstInningsSnapshot.overs} overs)\nTarget: ${currentMatch.target}`);
            updateUI();
        }
    }

    function handleMatchEnd() {
        if (currentMatch.matchEnded) return;
        currentMatch.takeSecondInningsSnapshot();
        currentMatch.matchEnded = true;
        matchActive = false;
        
        let result = currentMatch.getMatchResult();
        
        // Update point table
        if (!pointTable[currentMatch.teamAName]) pointTable[currentMatch.teamAName] = { played:0, won:0, lost:0, nr:0, pts:0, runsScored:0, oversFaced:0, runsConceded:0, oversBowled:0, nrr:0 };
        if (!pointTable[currentMatch.teamBName]) pointTable[currentMatch.teamBName] = { played:0, won:0, lost:0, nr:0, pts:0, runsScored:0, oversFaced:0, runsConceded:0, oversBowled:0, nrr:0 };
        
        pointTable[currentMatch.teamAName].played++;
        pointTable[currentMatch.teamBName].played++;
        
        let firstInningsRuns = currentMatch.target - 1;
        let firstInningsOvers = currentMatch.totalOvers;
        let secondInningsRuns = currentMatch.runs;
        let secondInningsOvers = parseFloat(currentMatch.formatOvers());
        
        if (currentMatch.batFirst === 'A') {
            pointTable[currentMatch.teamAName].runsScored += firstInningsRuns;
            pointTable[currentMatch.teamAName].oversFaced += firstInningsOvers;
            pointTable[currentMatch.teamAName].runsConceded += secondInningsRuns;
            pointTable[currentMatch.teamAName].oversBowled += secondInningsOvers;
            pointTable[currentMatch.teamBName].runsScored += secondInningsRuns;
            pointTable[currentMatch.teamBName].oversFaced += secondInningsOvers;
            pointTable[currentMatch.teamBName].runsConceded += firstInningsRuns;
            pointTable[currentMatch.teamBName].oversBowled += firstInningsOvers;
        } else {
            pointTable[currentMatch.teamBName].runsScored += firstInningsRuns;
            pointTable[currentMatch.teamBName].oversFaced += firstInningsOvers;
            pointTable[currentMatch.teamBName].runsConceded += secondInningsRuns;
            pointTable[currentMatch.teamBName].oversBowled += secondInningsOvers;
            pointTable[currentMatch.teamAName].runsScored += secondInningsRuns;
            pointTable[currentMatch.teamAName].oversFaced += secondInningsOvers;
            pointTable[currentMatch.teamAName].runsConceded += firstInningsRuns;
            pointTable[currentMatch.teamAName].oversBowled += firstInningsOvers;
        }
        
        if (result && result.includes(currentMatch.teamAName)) {
            pointTable[currentMatch.teamAName].won++;
            pointTable[currentMatch.teamAName].pts += 2;
            pointTable[currentMatch.teamBName].lost++;
        } else if (result) {
            pointTable[currentMatch.teamBName].won++;
            pointTable[currentMatch.teamBName].pts += 2;
            pointTable[currentMatch.teamAName].lost++;
        }
        
        for (let team in pointTable) {
            let t = pointTable[team];
            let battingNRR = t.oversFaced > 0 ? t.runsScored / t.oversFaced : 0;
            let bowlingNRR = t.oversBowled > 0 ? t.runsConceded / t.oversBowled : 0;
            t.nrr = (battingNRR - bowlingNRR).toFixed(3);
        }
        
        updatePointTableUI();
        alert(`🏆 MATCH OVER!\n${result}`);
        enableButtons(false);
        updateUI();
    }

    function updatePointTableUI() {
        let tbody = document.getElementById('pointTableBody'); tbody.innerHTML = '';
        let sorted = Object.entries(pointTable).sort((a,b) => { if(b[1].pts !== a[1].pts) return b[1].pts - a[1].pts; return parseFloat(b[1].nrr) - parseFloat(a[1].nrr); });
        for (let [team, stats] of sorted) tbody.innerHTML += `<tr><td><strong>${team}</strong></td><td>${stats.played}</td><td>${stats.won}</td><td>${stats.lost}</td><td>${stats.nr||0}</td><td><strong>${stats.pts}</strong></td><td style="color:${parseFloat(stats.nrr)>=0?'#10b981':'#ef4444'}">${stats.nrr}</td></tr>`;
        if (sorted.length === 0) tbody.innerHTML = '<tr><td colspan="7">No matches completed yet</td></tr>';
    }

    function changeBowler() { if (!currentMatch||!matchActive||currentMatch.matchEnded) return; let select = document.getElementById('bowlerSelect'); let bowlerName = select.value; if(!bowlerName){alert("Select bowler!");return;} if(currentMatch.setBowler(bowlerName)) updateUI(); }
    function addRuns(r) { if(currentMatch && matchActive && !currentMatch.matchEnded){ currentMatch.addRuns(r); updateUI(); } }
    function addWide() { if(currentMatch && matchActive && !currentMatch.matchEnded){ currentMatch.addWide(); updateUI(); } }
    function addWicket() { if(currentMatch && matchActive && !currentMatch.matchEnded){ currentMatch.addWicket(); updateUI(); } }
    function showNoBallModal() { if(!currentMatch||!matchActive||currentMatch.matchEnded){alert("Match not active!");return;} if(currentMatch.overComplete){alert("Change bowler first!");return;} document.getElementById('noballModal').style.display='flex'; }
    function processNoBall(runs) { if(currentMatch&&matchActive&&!currentMatch.matchEnded){currentMatch.addNoBall(runs);updateUI();closeNoBallModal();} }
    function closeNoBallModal() { document.getElementById('noballModal').style.display='none'; }
    function closeModal() { document.getElementById('setupModal').style.display='none'; }
    function enableButtons(enabled) { document.querySelectorAll('.run-btn').forEach(btn => { if(enabled) btn.removeAttribute('disabled'); else btn.setAttribute('disabled','disabled'); }); }
    
    updatePointTableUI(); enableButtons(false); renderPlayerLists();
</script>
